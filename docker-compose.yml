version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: lab-mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Test123456
      MYSQL_DATABASE: testdb
    volumes:
      - mysql-master-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --server-id=1 --log-bin=mysql-bin --binlog-do-db=testdb

  mysql-slave:
    image: mysql:8.0
    container_name: lab-mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Test123456
    volumes:
      - mysql-slave-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --server-id=2 --relay-log=relay-log
    depends_on:
      - mysql-master

  web:
    build: ./web-app
    container_name: lab-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: mysql-master
    depends_on:
      - mysql-master

  nginx:
    image: nginx:latest
    container_name: lab-nginx
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mysql-master
      - mysql-slave

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: lab-mysql-exporter
    restart: unless-stopped
    command:
      - "--mysqld.username=root:Test123456"
      - "--mysqld.address=mysql-master:3306"
    ports:
      - "9104:9104"
    depends_on:
      - mysql-master

  prometheus:
    image: prom/prometheus:latest
    container_name: lab-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - mysql-exporter
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: lab-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'

  jenkins:
    image: jenkins/jenkins:lts
    container_name: lab-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /root/my-ops-lab:/root/my-ops-lab
    group_add:
      - "994"

  grafana:
    image: grafana/grafana:latest
    container_name: lab-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    container_name: lab-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: lab-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  mysql-master-data:
  mysql-slave-data:
  jenkins-data:

groups:
  - name: mysql_alerts
    rules:
      - alert: MySQL_High_Connections
        expr: mysql_global_status_threads_connected > 2
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "MySQL 连接数过高"
          description: "当前连接数 {{ $value }}"

      - alert: MySQL_Too_Many_Queries
        expr: rate(mysql_global_status_queries[1m]) > 1
        for: 30s
        labels:
          severity: info
        annotations:
          summary: "MySQL QPS 上升"
          description: "每秒查询数 {{ $value }}"
